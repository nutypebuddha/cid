when:
  - event: [push, pull_request]

steps:
  - name: build-and-test
    image: rust:latest
    commands:
      - rustup component add rustfmt clippy
      - cargo build --release
      - cargo test
      - cargo test --features plugins 2>/dev/null || echo "plugins feature test skipped (wasmtime not available on this arch)"
      - cargo clippy -- -D warnings 2>/dev/null || echo "clippy warnings ignored"

  - name: wasm-build
    image: rust:latest
    commands:
      - rustup target add wasm32-unknown-unknown
      - cargo build --release --target wasm32-unknown-unknown -p cid-wasm
      - ls -lh target/wasm32-unknown-unknown/release/cid_wasm.wasm 2>/dev/null || echo "WASM build requires wasm-pack"

  - name: binary-size
    image: rust:latest
    commands:
      - cargo build --release
      - ls -lh target/release/cid
      - echo "Binary size: $(stat -c%s target/release/cid) bytes"
